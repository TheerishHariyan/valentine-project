<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine Princess?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="hearts-container"></div>

    <div class="card">
        <h1 class="title">Dearr Princesss 🐯❤️</h1>
        <p id="main-question" class="question">Be this guy's only Valentine for the rest of my life</p>

        <div class="image-container">
            <img id="main-image" src="cat.gif" alt="Our Valentine Photo" class="profile-img">
        </div>

        <div class="button-group" id="btn-group">
            <button id="no-btn" class="btn no-btn">NO 👿</button>
            <button id="yes-btn" class="btn yes-btn">YES 🥰</button>
        </div>

        <h2 id="success-text" class="success-text hidden">Thank youu for choosing this princess 🥹❤️</h2>
    </div>

    <div id="love-banner" class="love-banner hidden">
        <p id="banner-text"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
